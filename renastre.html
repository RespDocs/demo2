<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RENASTRE</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    height:100vh;
    display:flex;
    flex-direction:column;
}


header{

    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    background:#fff;
    box-shadow:0 2px 6px #0003;

}


h1{

    flex:1;
    text-align:center;
    font-size:20px;
    margin:0;

}


.acciones{

    display:flex;
    gap:8px;

}


.btn{

    text-decoration:none;
    background:#1976d2;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    font-size:14px;
    white-space:nowrap;
    cursor:pointer;

}


iframe{

    flex:1;
    width:100%;
    border:0;

}



@media(max-width:600px){

.btn{

    padding:8px 10px;
    font-size:12px;

}


h1{

    font-size:16px;

}

}


</style>

</head>


<body>


<script>

// ==========================
// CONFIGURACIÓN DEL VEHÍCULO
// ==========================

const PATENTE = "HLLD97";

const PDF = 
`RENASTRE-${PATENTE}.pdf`;


const VOLVER =
`https://respdocs.github.io/${PATENTE}/`;


const MTT =
`mtt.html?patente=${PATENTE}`;


</script>



<header>


<div class="acciones">


<a class="btn" id="volver">
🏠 Volver
</a>



<a class="btn" id="consulta">
🔎 Consulta MTT
</a>


</div>



<h1>
RENASTRE
</h1>



<a class="btn" id="descargar" download>
📥 Descargar
</a>


</header>




<iframe id="visor"></iframe>





<script>


document.getElementById("volver").href =
VOLVER;


document.getElementById("consulta").href =
MTT;


document.getElementById("descargar").href =
PDF;


document.getElementById("visor").src =
PDF + "#toolbar=0&navpanes=0";


</script>



</body>

</html>
