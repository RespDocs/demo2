<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RENASTRE</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    height:100vh;
    display:flex;
    flex-direction:column;
}


header{

    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    background:#fff;
    box-shadow:0 2px 6px #0003;

}


h1{

    flex:1;
    text-align:center;
    font-size:20px;
    margin:0;

}


.acciones{

    display:flex;
    gap:8px;

}


.btn{

    text-decoration:none;
    background:#1976d2;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
    white-space:nowrap;

}


iframe{

    flex:1;
    width:100%;
    border:0;

}


@media(max-width:600px){

.btn{
    font-size:12px;
    padding:8px 10px;
}

h1{
    font-size:16px;
}

}

</style>

</head>


<body>


<script>

const CONFIG = {

    patente:"HLLD97"

};


const BASE_URL =
`https://respdocs.github.io/${CONFIG.patente}/`;


const PDF =
`RENASTRE-${CONFIG.patente}.pdf`;


const MTT =
"https://apps.mtt.cl/consultaweb/default.aspx";


</script>



<header>


<div class="acciones">

<a class="btn" id="volver">
🏠 Volver
</a>


<a class="btn" onclick="abrirMTT()">
🔎 Consulta MTT
</a>

</div>



<h1 id="titulo">
RENASTRE
</h1>



<a class="btn" id="accion">
📥 Descargar
</a>


</header>



<iframe id="visor"></iframe>




<script>


const visor =
document.getElementById("visor");


const titulo =
document.getElementById("titulo");


const accion =
document.getElementById("accion");



document.getElementById("volver").href =
BASE_URL;



// Estado inicial PDF

function abrirPDF(){

    visor.src =
    PDF + "#toolbar=0&navpanes=0";

    titulo.textContent =
    "RENASTRE";

    accion.textContent =
    "📥 Descargar";

    accion.href =
    PDF;

}



// Abrir MTT dentro del visor

function abrirMTT(){

    visor.src = MTT;

    titulo.textContent =
    "RENASTRE - Consulta MTT";

    accion.textContent =
    "📄 Ver RENASTRE";

    accion.removeAttribute("download");

    accion.onclick = abrirPDF;

}



// cargar documento inicial

abrirPDF();


</script>


</body>

</html>
