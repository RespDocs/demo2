<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Consulta MTT HLLD97</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    height:100vh;
    display:flex;
    flex-direction:column;
}


header{
    padding:12px;
    background:white;
    box-shadow:0 2px 6px #0003;
}


.btn{
    background:#1976d2;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    text-decoration:none;
}


iframe{
    flex:1;
    width:100%;
    border:0;
}

</style>

</head>


<body>


<header>

<a class="btn" href="renastre.html">
🏠 Volver
</a>

</header>


<iframe id="mtt"
src="https://apps.mtt.cl/consultaweb/default.aspx">
</iframe>



<script>

const patente = "HLLD97";


// Intento de automatización

window.onload=function(){

    const iframe =
    document.getElementById("mtt");


    iframe.onload=function(){

        try{

            let doc =
            iframe.contentWindow.document;


            let campo =
            doc.querySelector("input");


            if(campo){

                campo.value = patente;

            }


        }catch(e){

            console.log(
            "El sitio bloquea acceso directo al iframe"
            );

        }

    }

}


</script>


</body>

</html>
