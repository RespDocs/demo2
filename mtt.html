<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Consulta MTT</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    height:100vh;
    display:flex;
    flex-direction:column;
}


header{

    padding:12px;
    background:#fff;
    box-shadow:0 2px 6px #0003;

}


.btn{

    text-decoration:none;
    background:#1976d2;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    font-size:14px;

}


iframe{

    flex:1;
    width:100%;
    border:0;

}


</style>

</head>


<body>


<header>

<a class="btn" id="volver">
🏠 Volver
</a>

</header>



<iframe id="visor"></iframe>



<script>


// ==========================
// OBTENER PATENTE
// ==========================

const parametros =
new URLSearchParams(window.location.search);


const patente =
parametros.get("patente") || "HLLD97";




// ==========================
// CONFIGURACIÓN
// ==========================


// Cambiar por tu Worker real

const WORKER =
"https://TU-WORKER.workers.dev/";




// URL consulta

const consulta =
WORKER + "?patente=" + patente;



// ==========================
// CARGAR RESULTADO
// ==========================


document.getElementById("visor").src =
consulta;




// ==========================
// BOTÓN VOLVER
// ==========================


document.getElementById("volver").href =
"renastre.html?patente=" + patente;



</script>



</body>

</html>
